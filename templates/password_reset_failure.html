<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAssetsReg: Password Reset Error</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #FA860D, #fff);
            color: #333;
        }

        .container {
            text-align: center;
            background: #fff;
            padding: 2rem 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e63946;
        }

        .p-large {
            font-size: 1rem;
        }

        p {
            font-size: 0.8rem;
            margin-top: 1rem;
            color: #555;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("year").textContent = new Date().getFullYear();
        });
    </script>
</head>

<body>
    <div class="container">
        <h2>Password Reset Error</h2>
        <p class="p-large">There was an error resetting your password. Please try again later.</p>
        <footer>© MyAssetsReg <span id="year"></span></footer>
    </div>
</body>

</html>
